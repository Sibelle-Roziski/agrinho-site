<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>AgroConsciente</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, sans-serif;
    }

    body{
      background:#f4f7f2;
      color:#333;
    }

    header{
      background:#2e7d32;
      color:white;
      padding:20px;
      text-align:center;
    }

    nav{
      margin-top:10px;
    }

    nav a{
      color:white;
      text-decoration:none;
      margin:0 15px;
      font-weight:bold;
    }

    .hero{
      height:80vh;
      background:linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)),
      url('https://images.unsplash.com/photo-1500937386664-56d1dfef3854?q=80&w=1200&auto=format&fit=crop');

      background-size:cover;
      background-position:center;

      display:flex;
      justify-content:center;
      align-items:center;
      text-align:center;

      color:white;
      padding:20px;
    }

    .hero h1{
      font-size:3rem;
      margin-bottom:20px;
    }

    .hero p{
      font-size:1.2rem;
      max-width:700px;
    }

    .btn{
      display:inline-block;
      margin-top:25px;
      padding:12px 25px;
      background:#8bc34a;
      color:white;
      text-decoration:none;
      border-radius:8px;
      font-weight:bold;
    }

  </style>
</head>

<body>

  <header>

    <h1>AgroConsciente</h1>

    <nav>
      <a href="#">Início</a>
      <a href="#">Problemas</a>
      <a href="#">Cuidados</a>
      <a href="#">Quiz</a>
    </nav>

  </header>

  <section class="hero">

    <div>

      <h1>
        Uso inadequado de defensivos agrícolas no campo
      </h1>

      <p>
        A tecnologia pode ajudar na conscientização sobre os riscos causados pelo uso incorreto de defensivos agrícolas.
      </p>

      <a href="#" class="btn">
        Saiba Mais
      </a>

    </div>

  </section>

</body>
</html>
